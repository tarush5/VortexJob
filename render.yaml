services:
  - type: web
    name: vortexjob-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PORT
        value: 10000
      - key: DB_PATH
        value: /var/data/database.sqlite
      - key: JWT_SECRET
        generateValue: true
