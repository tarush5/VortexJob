services:
  - type: web
    name: vortexjob-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: PORT
        value: 10000
      - key: DB_PATH
        value: ./data/database.sqlite
      - key: JWT_SECRET
        generateValue: true
