name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    name: Create a candidate release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          body: "See [change log](https://github.com/oraios/serena/blob/main/CHANGELOG.md)"
