# fly.toml app configuration file for Fly.io deployment

app = "vortexjob-scheduler"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[mounts]]
  source = "vortexjob_db_volume"
  destination = "/app/backend/data"
  initial_size = "1gb"

[env]
  PORT = "3000"
  DB_PATH = "/app/backend/data/jobs.db"
  NODE_ENV = "production"
